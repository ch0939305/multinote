<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>多功能筆記本</title>
  <!-- Font Awesome 圖標庫 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <!-- Supabase 支援（直接 REST API，不用 SDK） -->
  <style>
    /* ===== CSS 變數：日夜主題核心 ===== */
    :root {
      --bg: #f5f5f0;
      --card-bg: #ffffff;
      --text: #1e1e1e;
      --text-secondary: #666;
      --border: #d0d0c8;
      --accent: #4a90d9;
      --accent-hover: #357abd;
      --shadow: rgba(0,0,0,0.08);
      --input-bg: #fafaf8;
      --tag-bg: #e8e8e0;
      --header-bg: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      --danger: #e74c3c;
      --success: #27ae60;
      --radius: 10px;
    }

    /* 夜間模式：透過 .dark 切換全部變數 */
    .dark {
      --bg: #1a1a2e;
      --card-bg: #252540;
      --text: #e0e0e0;
      --text-secondary: #aaa;
      --border: #3a3a5c;
      --accent: #6c9ef0;
      --accent-hover: #4a7ed4;
      --shadow: rgba(0,0,0,0.3);
      --input-bg: #2a2a48;
      --tag-bg: #3a3a5c;
      --header-bg: linear-gradient(135deg, #1a1a4e 0%, #3a1a6e 100%);
    }

    /* ===== 全域重置 ===== */
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      transition: background 0.3s, color 0.3s;
    }

    /* ===== Header ===== */
    .header {
      background: var(--header-bg);
      padding: 18px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      box-shadow: 0 2px 12px var(--shadow);
    }
    .header h1 {
      color: #fff;
      font-size: 22px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .header-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* 日夜切換按鈕 */
    .theme-toggle {
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
      color: #fff;
      padding: 8px 14px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background 0.2s;
    }
    .theme-toggle:hover { background: rgba(255,255,255,0.25); }

    /* ===== 主容器 ===== */
    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 16px;
    }

    /* ===== 操作列：搜尋 + 新增 ===== */
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 20px;
      align-items: center;
    }
    .search-box {
      flex: 1;
      min-width: 200px;
      position: relative;
    }
    .search-box i {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-secondary);
    }
    .search-box input {
      width: 100%;
      padding: 10px 14px 10px 36px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--input-bg);
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border 0.2s;
    }
    .search-box input:focus { border-color: var(--accent); }

    /* 類別按鈕組 */
    .category-group {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .cat-btn {
      padding: 8px 16px;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: var(--card-bg);
      color: var(--text);
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
    }
    .cat-btn:hover { border-color: var(--accent); color: var(--accent); }
    .cat-btn.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .add-cat-btn {
      padding: 8px 12px;
      border: 1px dashed var(--border);
      border-radius: 20px;
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 13px;
    }
    .add-cat-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* 新增筆記按鈕 */
    .btn-primary {
      padding: 10px 20px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
      transition: background 0.2s;
    }
    .btn-primary:hover { background: var(--accent-hover); }

    /* ===== 筆記網格 ===== */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
    }
    .grid-empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 20px;
      color: var(--text-secondary);
    }
    .grid-empty i { font-size: 48px; margin-bottom: 12px; opacity: 0.4; }

    /* ===== 筆記卡片 ===== */
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: 0 2px 8px var(--shadow);
      transition: box-shadow 0.2s, transform 0.2s;
      display: flex;
      flex-direction: column;
    }
    .card:hover {
      box-shadow: 0 4px 16px var(--shadow);
      transform: translateY(-2px);
    }
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 8px;
    }
    .card-category {
      font-size: 11px;
      padding: 2px 10px;
      border-radius: 12px;
      background: var(--tag-bg);
      color: var(--text-secondary);
      white-space: nowrap;
    }
    .card-date {
      font-size: 11px;
      color: var(--text-secondary);
    }
    .card-title {
      font-size: 17px;
      font-weight: 600;
      margin-bottom: 8px;
      line-height: 1.4;
      word-break: break-word;
    }
    .card-body {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.6;
      flex: 1;
      word-break: break-word;
      /* 多行省略（最多5行） */
      display: -webkit-box;
      -webkit-line-clamp: 5;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-actions {
      display: flex;
      gap: 6px;
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
    }
    .card-actions button {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 12px;
      cursor: pointer;
      font-size: 12px;
      color: var(--text-secondary);
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .card-actions .edit-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(74,144,217,0.08);
    }
    .card-actions .del-btn:hover {
      border-color: var(--danger);
      color: var(--danger);
      background: rgba(231,76,60,0.08);
    }

    /* ===== Modal 彈窗 ===== */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--card-bg);
      border-radius: 14px;
      padding: 24px;
      width: 100%;
      max-width: 560px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }
    .modal h2 {
      margin-bottom: 16px;
      font-size: 20px;
    }
    .modal label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin: 12px 0 4px;
      color: var(--text-secondary);
    }
    .modal input,
    .modal textarea,
    .modal select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--input-bg);
      color: var(--text);
      font-size: 14px;
      outline: none;
      font-family: inherit;
    }
    .modal input:focus,
    .modal textarea:focus,
    .modal select:focus {
      border-color: var(--accent);
    }
    .modal textarea {
      min-height: 120px;
      resize: vertical;
    }
    .modal .form-row {
      display: flex;
      gap: 12px;
    }
    .modal .form-row > * { flex: 1; }
    .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 18px;
    }
    .modal-actions button {
      padding: 9px 20px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 14px;
      transition: opacity 0.2s;
    }
    .modal-actions .btn-cancel {
      background: var(--tag-bg);
      color: var(--text);
    }
    .modal-actions .btn-save {
      background: var(--accent);
      color: #fff;
    }
    .modal-actions .btn-save:hover,
    .modal-actions .btn-cancel:hover { opacity: 0.85; }

    /* ===== 類別管理 ===== */
    .cat-manage {
      display: none;
      margin-bottom: 16px;
      padding: 12px 16px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }
    .cat-manage.open { display: block; }
    .cat-manage .cat-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 8px 0;
    }
    .cat-manage .cat-tag {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      background: var(--tag-bg);
      border-radius: 16px;
      font-size: 13px;
    }
    .cat-manage .cat-tag .remove-cat {
      cursor: pointer;
      color: var(--danger);
      font-size: 12px;
    }
    .cat-manage .add-cat-input {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }
    .cat-manage .add-cat-input input {
      flex: 1;
      padding: 6px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--input-bg);
      color: var(--text);
      font-size: 13px;
      outline: none;
    }
    .cat-manage .add-cat-input button {
      padding: 6px 14px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    /* ===== 統計列 ===== */
    .stats {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 12px;
    }

    /* ===== Toast 提示 ===== */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: #333;
      color: #fff;
      padding: 10px 24px;
      border-radius: 8px;
      font-size: 14px;
      z-index: 2000;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; }

    /* ===== RWD 手機適應 ===== */
    @media (max-width: 640px) {
      .header { padding: 14px 16px; }
      .header h1 { font-size: 18px; }
      .grid { grid-template-columns: 1fr; }
      .toolbar { flex-direction: column; }
      .search-box { min-width: 100%; }
      .btn-primary { width: 100%; justify-content: center; }
      .modal { padding: 16px; }
    }
  </style>
</head>
<body>

  <!-- ===== Header ===== -->
  <header class="header">
    <h1><i class="fa-solid fa-book"></i> 多功能筆記本</h1>
    <div class="header-actions">
      <button class="theme-toggle" id="themeToggle" title="切換日夜模式">
        <i class="fa-solid fa-moon"></i> <span>夜間</span>
      </button>
      <button class="theme-toggle" id="backendConfigBtn" title="後端設定" style="padding:8px 12px;font-size:13px">
        <i class="fa-solid fa-server"></i>
      </button>
    </div>
  </header>
  
  <!-- ===== 後端設定 Modal（簡易 prompt） ===== -->
  <div class="modal-overlay" id="backendModal">
    <div class="modal">
      <h2>🔗 後端連線設定</h2>
      <p style="font-size:13px;color:var(--text-secondary);margin-bottom:12px">
        輸入後端 API 網址。如果是 Supabase，下面也要填 anon key。留空 = 使用本機儲存
      </p>
      <label for="backendUrlInput">API 網址</label>
      <input type="url" id="backendUrlInput" placeholder="https://xxx.supabase.co" value="" />
      <label for="backendKeyInput">Supabase anon key（非 Supabase 可不填）</label>
      <input type="text" id="backendKeyInput" placeholder="eyJhbGciOiJIUzI1NiIs..." value="" style="font-size:12px" />
      <div class="modal-actions">
        <button class="btn-cancel" id="backendCancelBtn">取消</button>
        <button class="btn-save" id="backendSaveBtn">套用</button>
      </div>
    </div>
  </div>

  <div class="container">
    <!-- ===== 工具列 ===== -->
    <div class="toolbar">
      <div class="search-box">
        <i class="fa-solid fa-search"></i>
        <input type="text" id="searchInput" placeholder="搜尋筆記..." />
      </div>
      <div class="category-group" id="categoryGroup">
        <!-- 由 JS 動態產生 -->
      </div>
      <div>
        <button class="add-cat-btn" id="manageCatBtn" title="管理類別">
          <i class="fa-solid fa-tags"></i>
        </button>
        <button class="btn-primary" id="addNoteBtn">
          <i class="fa-solid fa-plus"></i> 新增筆記
        </button>
        <button class="add-cat-btn" id="exportDataBtn" title="匯出備份" style="padding:8px 12px;">
          <i class="fa-solid fa-download"></i>
        </button>
        <button class="add-cat-btn" id="importDataBtn" title="匯入備份" style="padding:8px 12px;">
          <i class="fa-solid fa-upload"></i>
        </button>
      </div>
    </div>

    <!-- ===== 隱藏檔案輸入（供匯入用） ===== -->
    <input type="file" id="importFileInput" accept=".json" style="display:none" />

    <!-- ===== 類別管理面板 ===== -->
    <div class="cat-manage" id="catManagePanel">
      <strong>管理類別</strong>
      <div class="cat-list" id="catList"></div>
      <div class="add-cat-input">
        <input type="text" id="newCatInput" placeholder="新類別名稱..." maxlength="20" />
        <button id="addCatConfirmBtn">新增</button>
      </div>
    </div>

    <!-- ===== 統計 ===== -->
    <div class="stats" id="statsBar">共 0 則筆記</div>
    <div class="stats" id="debugBar" style="font-size:11px;color:var(--text3);margin-top:-8px;margin-bottom:8px"></div>

    <!-- ===== 筆記網格 ===== -->
    <div class="grid" id="noteGrid"></div>
  </div>

  <!-- ===== Modal 編輯/新增 ===== -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h2 id="modalTitle">新增筆記</h2>
      <label for="noteTitle">標題</label>
      <input type="text" id="noteTitle" placeholder="輸入標題..." maxlength="100" />

      <label for="noteCategory">類別</label>
      <select id="noteCategory"></select>

      <label for="noteContent">內容</label>
      <textarea id="noteContent" placeholder="輸入筆記內容..."></textarea>

      <div class="modal-actions">
        <button class="btn-cancel" id="modalCancelBtn">取消</button>
        <button class="btn-save" id="modalSaveBtn"><i class="fa-solid fa-floppy-disk"></i> 儲存</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
    // ============================================================
    //  後端連線設定（填 URL 即啟用 API 模式）
    // ============================================================
    // 預設使用 Supabase 雲端資料庫
    // 如果不想用雲端，按 🔗 清空設定即可切回本機模式
    const SUPABASE_URL = 'https://pavndetdbxytcegitvfx.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBhdm5kZXRkYnh5dGNlZ2l0dmZ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM5Mjk4NDMsImV4cCI6MjA5OTUwNTg0M30.W0nRosd8aY8PU-RL1_IO0rrMLP4PgTFg36lUKgCBAUQ';

    // ─── 清除可能殘留的錯誤設定 ───
    localStorage.removeItem('multinote_api_url');
    localStorage.removeItem('multinote_supabase_key');

    // 🔒 固定使用 Supabase 雲端
    const API_BASE = SUPABASE_URL;

    function isBackendMode() { return true; }

    function getBackendUrl() { return API_BASE; }

    // 非同步 API 呼叫封裝
    async function apiFetch(method, path, body) {
      const opts = { method, headers: { 'Content-Type': 'application/json' } };
      if (body) opts.body = JSON.stringify(body);
      const res = await fetch(API_BASE + path, opts);
      if (!res.ok) throw new Error(`API 錯誤 ${res.status}`);
      return res.json();
    }

    // ─── Supabase 客戶端（直接 REST API，不用 SDK） ───
    let _isSupabaseMode = false;
    let _supaUrl = '';
    let _supaKey = '';

    function initSupabase() {
      if (!isBackendMode()) return;
      const url = API_BASE;
      if (url.includes('supabase.co')) {
        _supaUrl = url;
        _supaKey = localStorage.getItem('multinote_supabase_key') || SUPABASE_KEY;
        if (_supaKey && _supaKey.length > 20) {
          _isSupabaseMode = true;
          console.log('🚀 Supabase REST 模式已啟用');
        } else {
          console.warn('⚠️ 需要設定 Supabase anon key');
          _isSupabaseMode = false;
        }
      } else {
        _isSupabaseMode = false;
      }
    }

    // Supabase REST 通用請求
    async function supaFetch(method, table, options = {}) {
      const { params, body, select } = options;
      let url = `${_supaUrl}/rest/v1/${table}`;
      if (params) url += '?' + params;
      const headers = {
        'apikey': _supaKey,
        'Authorization': `Bearer ${_supaKey}`,
        'Content-Type': 'application/json',
      };
      if (select) headers['Prefer'] = 'return=representation';
      const opts = { method, headers };
      if (body) opts.body = JSON.stringify(body);
      const res = await fetch(url, opts);
      if (!res.ok) {
        const text = await res.text();
        throw new Error(`Supabase ${method} ${table}: ${res.status} ${text.slice(0,100)}`);
      }
      if (method === 'DELETE') return null;
      return res.json();
    }

    // ─── 後端資料操作 ───
    let _backNotes = [];
    let _backCats = [];

    async function backLoadAll() {
      if (!isBackendMode()) return;
      if (_isSupabaseMode) {
        try {
          const notes = await supaFetch('GET', 'notes', { params: 'order=updated_at.desc' });
          const catsRaw = await supaFetch('GET', 'categories', { params: 'select=name' });
          _backNotes = notes || [];
          _backCats = (catsRaw || []).map(c => c.name);
          console.log(`☁️ Supabase 已載入 ${_backNotes.length} 則筆記`);
        } catch (e) {
          console.warn('⚠️ Supabase 載入失敗:', e.message);
          showToast('⚠️ 無法連線資料庫：' + e.message);
        }
        return;
      }
      // 客製後端
      try {
        const [notes, cats] = await Promise.all([
          apiFetch('GET', '/notes'),
          apiFetch('GET', '/categories'),
        ]);
        _backNotes = notes;
        _backCats = cats;
        console.log(`🌐 已從後端載入 ${notes.length} 則筆記`);
      } catch (e) {
        console.warn('⚠️ 無法連線後端，降級為本機模式', e);
      }
    }

    // ============================================================    
    //  一、資料層：IndexedDB 為主 + localStorage 備援
    // ============================================================
    // 為什麼用 IndexedDB：關閉瀏覽器後 localStorage 可能被清除
    // IndexedDB 跨 session 持久保存，容量更大更可靠
    // ============================================================

    const DB_NAME = 'MultinoteDB';
    const DB_VER = 1;
    const STORE_NOTES = 'notes';
    const STORE_META = 'meta';

    /** 記憶體快取（讓 sync API 順暢運作） */
    let _cache = { notes: [], cats: ['日常', '電腦', 'AI'], dark: false };
    let _dbReady = false;

    /** 開啟 IndexedDB */
    function openDB() {
      return new Promise((resolve, reject) => {
        const req = indexedDB.open(DB_NAME, DB_VER);
        req.onupgradeneeded = function(e) {
          const db = e.target.result;
          if (!db.objectStoreNames.contains(STORE_NOTES)) {
            db.createObjectStore(STORE_NOTES, { keyPath: 'id' });
          }
          if (!db.objectStoreNames.contains(STORE_META)) {
            db.createObjectStore(STORE_META);
          }
        };
        req.onsuccess = function(e) {
          _dbReady = true;
          resolve(e.target.result);
        };
        req.onerror = function(e) {
          console.warn('⚠️ IndexedDB 無法開啟，降級使用 localStorage');
          reject(e.target.error);
        };
      });
    }

    /** 寫入 IndexedDB：寫一筆到 objectStore */
    function dbPut(storeName, key, value) {
      return new Promise((resolve, reject) => {
        if (!_dbReady) { reject(new Error('DB not ready')); return; }
        openDB().then(db => {
          const tx = db.transaction(storeName, 'readwrite');
          const store = tx.objectStore(storeName);
          if (storeName === STORE_NOTES) {
            // notes store 使用 keyPath，用 put 取代
            value.forEach(n => store.put(n));
          } else {
            store.put(value, key);
          }
          tx.oncomplete = () => { db.close(); resolve(); };
          tx.onerror = () => { db.close(); reject(tx.error); };
        }).catch(reject);
      });
    }

    /** 從 IndexedDB 讀取全部資料 */
    function dbGetAll(storeName) {
      return new Promise((resolve, reject) => {
        if (!_dbReady) { reject(new Error('DB not ready')); return; }
        openDB().then(db => {
          const tx = db.transaction(storeName, 'readonly');
          const store = tx.objectStore(storeName);
          const req = store.getAll();
          req.onsuccess = () => { db.close(); resolve(req.result); };
          req.onerror = () => { db.close(); reject(req.error); };
        }).catch(reject);
      });
    }

    /** 從 IndexedDB 讀取單一 key */
    function dbGet(storeName, key) {
      return new Promise((resolve, reject) => {
        if (!_dbReady) { reject(new Error('DB not ready')); return; }
        openDB().then(db => {
          const tx = db.transaction(storeName, 'readonly');
          const store = tx.objectStore(storeName);
          const req = store.get(key);
          req.onsuccess = () => { db.close(); resolve(req.result); };
          req.onerror = () => { db.close(); reject(req.error); };
        }).catch(reject);
      });
    }

    /** 清除 IndexedDB 的某個 store */
    function dbClear(storeName) {
      return new Promise((resolve, reject) => {
        if (!_dbReady) { reject(new Error('DB not ready')); return; }
        openDB().then(db => {
          const tx = db.transaction(storeName, 'readwrite');
          tx.objectStore(storeName).clear();
          tx.oncomplete = () => { db.close(); resolve(); };
          tx.onerror = () => { db.close(); reject(tx.error); };
        }).catch(reject);
      });
    }

    // ─── 筆記 CRUD ───

    function loadNotes() {
      // 後端模式：從記憶體快取讀
      if (isBackendMode()) return [..._backNotes];
      // 本機模式：從 IndexedDB 快取讀
      return [..._cache.notes];
    }

    async function saveNotes(notes) {
      if (isBackendMode()) {
        // 後端模式：全部取代（先刪後建）
        // 實際使用時建議逐筆 CRUD，這裡先保留既有邏輯
        _backNotes = [...notes];
        return;
      }
      _cache.notes = [...notes];
      dbClear(STORE_NOTES).then(() => dbPut(STORE_NOTES, null, notes)).catch(() => {});
      try { localStorage.setItem('multinotes', JSON.stringify(notes)); } catch {}
    }

    // ─── 後端模式專用：單筆 CRUD ───
    // ─── Supabase 專用：插入/更新/刪除筆記（使用 REST fetch） ───
    async function supAddNote(note) {
      const data = await supaFetch('POST', 'notes', { body: note, select: true });
      if (data && data.length > 0) {
        _backNotes.unshift(data[0]);
        return data[0];
      }
      _backNotes.unshift(note);
      return note;
    }

    async function supUpdateNote(id, updates) {
      const now = nowStr();
      const data = await supaFetch('PATCH', 'notes', {
        body: { ...updates, updated_at: now },
        params: `id=eq.${id}`,
        select: true
      });
      const idx = _backNotes.findIndex(n => n.id === id);
      if (idx !== -1 && data && data.length > 0) _backNotes[idx] = data[0];
      return data && data[0];
    }

    async function supDeleteNote(id) {
      await supaFetch('DELETE', 'notes', { params: `id=eq.${id}` });
      _backNotes = _backNotes.filter(n => n.id !== id);
    }

    async function supAddCategory(name) {
      await supaFetch('POST', 'categories', { body: { name } });
      _backCats.push(name);
    }

    async function supDeleteCategory(name) {
      const other = _backCats.find(c => c !== name);
      if (other) {
        await supaFetch('PATCH', 'notes', {
          body: { category: other },
          params: `category=eq.${encodeURIComponent(name)}`
        });
        _backNotes.forEach(n => { if (n.category === name) n.category = other; });
      }
      await supaFetch('DELETE', 'categories', { params: `name=eq.${encodeURIComponent(name)}` });
      _backCats = _backCats.filter(c => c !== name);
    }

    async function backAddNote(note) {
      if (_isSupabaseMode) return supAddNote(note);
      const saved = await apiFetch('POST', '/notes', note);
      _backNotes.push(saved);
      return saved;
    }

    async function backUpdateNote(id, updates) {
      if (_isSupabaseMode) return supUpdateNote(id, updates);
      const saved = await apiFetch('PUT', `/notes/${id}`, updates);
      const idx = _backNotes.findIndex(n => n.id === id);
      if (idx !== -1) _backNotes[idx] = saved;
      return saved;
    }

    async function backDeleteNote(id) {
      if (_isSupabaseMode) return supDeleteNote(id);
      await apiFetch('DELETE', `/notes/${id}`);
      _backNotes = _backNotes.filter(n => n.id !== id);
    }

    /** 產生短 UID (8 碼十六進位) */
    function uid() {
      return Math.random().toString(16).slice(2, 10);
    }

    /** 取得台灣時間字串 */
    function nowStr() {
      return new Date().toLocaleString('zh-TW', { timeZone: 'Asia/Taipei' });
    }

    // ─── 類別管理 ───

    const DEFAULT_CATS = ['日常', '電腦', 'AI'];

    function loadCategories() {
      if (isBackendMode()) return [..._backCats];
      return [..._cache.cats];
    }

    function saveCategories(cats) {
      if (isBackendMode()) { _backCats = [...cats]; return; }
      _cache.cats = [...cats];
      dbPut(STORE_META, 'cats', cats).catch(() => {});
      try { localStorage.setItem('multinotes_cats', JSON.stringify(cats)); } catch {}
    }

    async function backAddCategory(name) {
      if (_isSupabaseMode) return supAddCategory(name);
      await apiFetch('POST', '/categories', { name });
      _backCats.push(name);
    }

    async function backDeleteCategory(name) {
      if (_isSupabaseMode) return supDeleteCategory(name);
      const other = _backCats.find(c => c !== name);
      if (other) {
        _backNotes.forEach(n => {
          if (n.category === name) n.category = other;
        });
      }
      await apiFetch('DELETE', `/categories/${encodeURIComponent(name)}`);
      _backCats = _backCats.filter(c => c !== name);
    }

    // ─── 主題設定 ───

    function loadTheme() {
      return _cache.dark;
    }

    function saveTheme(dark) {
      _cache.dark = dark;
      dbPut(STORE_META, 'dark', dark).catch(() => {});
      try { localStorage.setItem('multinotes_dark', dark ? 'true' : 'false'); } catch {}
    }

    // ─── 啟動時從 IndexedDB / localStorage 載入快取 ───
    async function initData() {
      try {
        // 先嘗試從 IndexedDB 讀
        const [idbNotes, idbCats, idbDark] = await Promise.all([
          dbGetAll(STORE_NOTES).catch(() => null),
          dbGet(STORE_META, 'cats').catch(() => null),
          dbGet(STORE_META, 'dark').catch(() => null),
        ]);

        if (idbNotes && idbNotes.length > 0) {
          _cache.notes = idbNotes;
        } else {
          // fallback: localStorage
          const ls = localStorage.getItem('multinotes');
          if (ls) {
            try { _cache.notes = JSON.parse(ls) || []; } catch { _cache.notes = []; }
          }
        }

        if (idbCats && idbCats.length > 0) {
          _cache.cats = idbCats;
        } else {
          const ls = localStorage.getItem('multinotes_cats');
          if (ls) {
            try { _cache.cats = JSON.parse(ls) || [...DEFAULT_CATS]; } catch { _cache.cats = [...DEFAULT_CATS]; }
          }
        }

        _cache.dark = idbDark === true || localStorage.getItem('multinotes_dark') === 'true';

        // 同步：把快取寫回兩種儲存
        try { localStorage.setItem('multinotes', JSON.stringify(_cache.notes)); } catch {}
        try { localStorage.setItem('multinotes_cats', JSON.stringify(_cache.cats)); } catch {}
        try { localStorage.setItem('multinotes_dark', _cache.dark ? 'true' : 'false'); } catch {}
        dbClear(STORE_NOTES).then(() => dbPut(STORE_NOTES, null, _cache.notes)).catch(() => {});
        dbPut(STORE_META, 'cats', _cache.cats).catch(() => {});
        dbPut(STORE_META, 'dark', _cache.dark).catch(() => {});

        console.log(`📦 IndexedDB 已載入：${_cache.notes.length} 則筆記, ${_cache.cats.length} 個類別`);
        return true;
      } catch (e) {
        console.warn('⚠️ 載入失敗，使用 localStorage 備援:', e);
        _cache.notes = JSON.parse(localStorage.getItem('multinotes') || '[]');
        _cache.cats = JSON.parse(localStorage.getItem('multinotes_cats') || '["日常","電腦","AI"]');
        _cache.dark = localStorage.getItem('multinotes_dark') === 'true';
        return false;
      }
    }

    // ============================================================
    //  二、主題切換
    // ============================================================

    function initTheme() {
      const dark = loadTheme();
      document.documentElement.classList.toggle('dark', dark);
      renderThemeBtn(dark);
    }

    function toggleTheme() {
      const dark = !document.documentElement.classList.contains('dark');
      document.documentElement.classList.toggle('dark', dark);
      saveTheme(dark);
      renderThemeBtn(dark);
    }

    function renderThemeBtn(dark) {
      const btn = document.getElementById('themeToggle');
      btn.innerHTML = dark
        ? '<i class="fa-solid fa-sun"></i> <span>日間</span>'
        : '<i class="fa-solid fa-moon"></i> <span>夜間</span>';
    }

    // ============================================================
    //  四、UI 渲染
    // ============================================================

    let currentFilter = '全部';   // 當前選中的類別
    let searchQuery = '';
    let editingId = null;         // null = 新增模式, string = 編輯模式

    const $ = id => document.getElementById(id);
    const grid = $('noteGrid');
    const stats = $('statsBar');
    const catGroup = $('categoryGroup');
    const modalOverlay = $('modalOverlay');
    const modalTitle = $('modalTitle');
    const noteTitle = $('noteTitle');
    const noteCategory = $('noteCategory');
    const noteContent = $('noteContent');
    const searchInput = $('searchInput');

    /** Toast 提示 */
    function showToast(msg) {
      const t = $('toast');
      t.textContent = msg;
      t.classList.add('show');
      clearTimeout(t._timer);
      t._timer = setTimeout(() => t.classList.remove('show'), 2000);
    }

    /** 渲染類別按鈕 + 管理面板 */
    function renderCategories() {
      const cats = loadCategories();
      // 類別按鈕
      catGroup.innerHTML = `
        <button class="cat-btn ${currentFilter === '全部' ? 'active' : ''}" data-cat="全部">全部</button>
        ${cats.map(c => `
          <button class="cat-btn ${currentFilter === c ? 'active' : ''}" data-cat="${c.replace(/"/g, '&quot;')}">${c}</button>
        `).join('')}
      `;

      // 管理面板列表
      const catList = $('catList');
      catList.innerHTML = cats.map(c => `
        <span class="cat-tag">
          ${c}
          <span class="remove-cat" data-cat="${c.replace(/"/g, '&quot;')}"><i class="fa-solid fa-xmark"></i></span>
        </span>
      `).join('');

      // 表單中的類別下拉選單
      const sel = noteCategory;
      const selected = sel.value;
      sel.innerHTML = cats.map(c =>
        `<option value="${c}" ${c === selected ? 'selected' : ''}>${c}</option>`
      ).join('');
    }

    /** 更新除錯狀態欄 */
    function updateDebugBar() {
      const notes = loadNotes();
      const db = $('debugBar');
      const modeText = isBackendMode()
        ? `🌐 後端模式 (${API_BASE})`
        : '💻 本機模式';
      try {
        const size = new Blob([JSON.stringify(notes)]).size;
        const kb = (size / 1024).toFixed(1);
        db.textContent = `💾 ${notes.length} 則 · ${kb}KB · ${modeText}`;
      } catch {
        db.textContent = `💾 ${notes.length} 則 · ${modeText}`;
      }
    }

    /** 渲染筆記網格 */
    function renderNotes() {
      const notes = loadNotes();
      const cats = loadCategories();

      // 過濾：類別 + 搜尋
      let filtered = notes;
      if (currentFilter !== '全部') {
        filtered = filtered.filter(n => n.category === currentFilter);
      }
      if (searchQuery.trim()) {
        const q = searchQuery.trim().toLowerCase();
        filtered = filtered.filter(n =>
          n.title.toLowerCase().includes(q) ||
          n.content.toLowerCase().includes(q)
        );
      }
      // 最新在前
      filtered.sort((a, b) => new Date(b.updatedAt || b.createdAt) - new Date(a.updatedAt || a.createdAt));

      // 統計
      stats.textContent = `共 ${filtered.length} 則筆記${currentFilter !== '全部' ? `（${currentFilter}）` : ''}`;
      updateDebugBar();

      if (filtered.length === 0) {
        grid.innerHTML = `<div class="grid-empty">
          <i class="fa-regular fa-note-sticky"></i>
          <p>目前沒有筆記</p>
        </div>`;
        return;
      }

      grid.innerHTML = filtered.map(n => {
        const catColor = getCatColor(n.category, cats);
        const date = n.updatedAt || n.createdAt;
        return `
          <div class="card" data-id="${n.id}">
            <div class="card-header">
              <span class="card-category" style="background:${catColor.bg};color:${catColor.fg}">${n.category}</span>
              <span class="card-date">${date}</span>
            </div>
            <div class="card-title">${escapeHtml(n.title)}</div>
            <div class="card-body">${escapeHtml(n.content)}</div>
            <div class="card-actions">
              <button class="edit-btn" data-id="${n.id}"><i class="fa-regular fa-pen-to-square"></i> 編輯</button>
              <button class="del-btn"  data-id="${n.id}"><i class="fa-regular fa-trash-can"></i> 刪除</button>
            </div>
          </div>
        `;
      }).join('');
    }

    /** 簡易 HTML 跳脫防 XSS */
    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    /** 根據類別名稱回傳不同的標籤顏色（🔒 安全：未知類別用預設色） */
    function getCatColor(cat, cats) {
      const palette = [
        { bg: '#e3f2fd', fg: '#1565c0' },
        { bg: '#e8f5e9', fg: '#2e7d32' },
        { bg: '#fff3e0', fg: '#e65100' },
        { bg: '#fce4ec', fg: '#c62828' },
        { bg: '#f3e5f5', fg: '#6a1b9a' },
        { bg: '#e0f7fa', fg: '#00695c' },
        { bg: '#fff8e1', fg: '#f9a825' },
        { bg: '#efebe9', fg: '#4e342e' },
      ];
      // ⚠️ JS 中 -1 % 8 = -1，不能用負索引
      const idx = cats.indexOf(cat);
      const safeIdx = (idx < 0) ? 0 : (idx % palette.length);
      return palette[safeIdx];
    }

    /** 除錯：檢查 localStorage 資料完整性 */
    function debugData() {
      const notes = loadNotes();
      const cats = loadCategories();
      const dark = loadTheme();
      console.log(`📝 筆記本狀態：${notes.length} 則筆記, ${cats.length} 個類別, 夜間模式=${dark}`);
      if (notes.length > 0) {
        console.log('📋 筆記列表：', notes.map(n => ({ id: n.id, title: n.title, cat: n.category })));
      }
      return { noteCount: notes.length, catCount: cats.length };
    }

    // ============================================================
    //  五、CRUD 操作
    // ============================================================

    /** 開啟新增 Modal */
    function openAddModal() {
      editingId = null;
      modalTitle.textContent = '新增筆記';
      noteTitle.value = '';
      noteCategory.value = currentFilter !== '全部' ? currentFilter : (loadCategories()[0] || '日常');
      noteContent.value = '';
      modalOverlay.classList.add('open');
      noteTitle.focus();
    }

    /** 開啟編輯 Modal */
    function openEditModal(id) {
      const notes = loadNotes();
      const note = notes.find(n => n.id === id);
      if (!note) return;
      editingId = id;
      modalTitle.textContent = '編輯筆記';
      noteTitle.value = note.title;
      noteCategory.value = note.category;
      noteContent.value = note.content;
      modalOverlay.classList.add('open');
      noteTitle.focus();
    }

    /** 關閉 Modal */
    function closeModal() {
      modalOverlay.classList.remove('open');
      editingId = null;
    }

    /** 儲存筆記（新增或更新） */
    async function saveNote() {
      const title = noteTitle.value.trim() || '無標題';
      const category = noteCategory.value;
      const content = noteContent.value.trim();

      if (isBackendMode()) {
        try {
          if (editingId) {
            await backUpdateNote(editingId, { title, content, category });
            showToast('✅ 筆記已更新');
          } else {
            await backAddNote({ title, content, category });
            showToast('✅ 筆記已新增');
          }
        } catch (e) {
          showToast('⚠️ 儲存失敗：' + e.message);
          return;
        }
        closeModal();
        renderNotes();
        updateDebugBar();
        return;
      }

      // 本機模式（原邏輯）
      let notes = loadNotes();

      if (editingId) {
        const idx = notes.findIndex(n => n.id === editingId);
        if (idx === -1) { showToast('找不到此筆記'); return; }
        notes[idx] = {
          ...notes[idx],
          title,
          category,
          content,
          updatedAt: nowStr()
        };
        saveNotes(notes);
        showToast('✅ 筆記已更新');
      } else {
        const note = {
          id: uid(),
          title,
          category,
          content,
          createdAt: nowStr(),
          updatedAt: nowStr()
        };
        notes.push(note);
        saveNotes(notes);
        showToast('✅ 筆記已新增');
      }

      closeModal();
      renderNotes();
      updateDebugBar();
      console.log(`💾 儲存成功 · 共 ${loadNotes().length} 則`);
    }

    /** 刪除筆記（含確認） */
    async function deleteNote(id) {
      if (!confirm('確定要刪除這則筆記嗎？')) return;
      if (isBackendMode()) {
        try {
          await backDeleteNote(id);
          renderNotes();
          updateDebugBar();
          showToast('🗑️ 筆記已刪除');
        } catch (e) {
          showToast('⚠️ 刪除失敗：' + e.message);
        }
        return;
      }
      let notes = loadNotes();
      notes = notes.filter(n => n.id !== id);
      saveNotes(notes);
      renderNotes();
      updateDebugBar();
      showToast('🗑️ 筆記已刪除');
    }

    // ============================================================
    //  六、類別管理
    // ============================================================

    function toggleCatPanel() {
      $('catManagePanel').classList.toggle('open');
      renderCategories();
    }

    async function addCategory(name) {
      name = name.trim();
      if (!name) return;
      let cats = loadCategories();
      if (cats.includes(name)) {
        showToast('⚠️ 類別已存在');
        return;
      }
      cats.push(name);
      if (isBackendMode()) {
        try { await backAddCategory(name); } catch (e) { showToast('⚠️ 新增失敗：' + e.message); return; }
      } else {
        saveCategories(cats);
      }
      renderCategories();
      $('newCatInput').value = '';
      showToast('✅ 類別已新增');
    }

    async function removeCategory(name) {
      let cats = loadCategories();
      if (cats.length <= 1) {
        showToast('⚠️ 至少需要一個類別');
        return;
      }
      if (isBackendMode()) {
        try {
          await backDeleteCategory(name);
          renderCategories();
          renderNotes();
          updateDebugBar();
          showToast('🗑️ 類別已刪除');
        } catch (e) { showToast('⚠️ 刪除失敗：' + e.message); }
        return;
      }
      // 本機模式：將使用此類別的筆記改為第一個類別
      let notes = loadNotes();
      let changed = false;
      notes.forEach(n => {
        if (n.category === name) {
          n.category = cats.find(c => c !== name) || cats[0];
          changed = true;
        }
      });
      if (changed) saveNotes(notes);
      cats = cats.filter(c => c !== name);
      saveCategories(cats);
      if (currentFilter === name) currentFilter = '全部';
      renderCategories();
      renderNotes();
      updateDebugBar();
      showToast('🗑️ 類別已刪除');
    }

    // ============================================================
    //  七、匯出／匯入
    // ============================================================

    function exportData() {
      const notes = loadNotes();
      const cats = loadCategories();
      const data = { notes, cats, exportedAt: nowStr(), version: 1 };
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      const ts = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
      a.download = `筆記本備份_${ts}.json`;
      a.click();
      URL.revokeObjectURL(url);
      showToast('📤 資料已匯出');
    }

    function importData(file) {
      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const data = JSON.parse(e.target.result);
          if (!data.notes || !Array.isArray(data.notes)) {
            showToast('⚠️ 格式錯誤：缺少筆記資料');
            return;
          }
          const count = data.notes.length;
          saveNotes(data.notes);
          if (data.cats && Array.isArray(data.cats)) {
            saveCategories(data.cats);
          }
          showToast(`📥 已匯入 ${count} 則筆記`);
          renderCategories();
          renderNotes();
        } catch(err) {
          showToast('⚠️ 匯入失敗：檔案格式錯誤');
          console.error('匯入錯誤:', err);
        }
      };
      reader.readAsText(file);
    }

    // ============================================================
    //  八、事件綁定（委派）
    // ============================================================

    // 主題切換
    $('themeToggle').addEventListener('click', toggleTheme);

    // 新增筆記
    $('addNoteBtn').addEventListener('click', openAddModal);

    // 匯出 / 匯入
    $('exportDataBtn').addEventListener('click', exportData);
    $('importDataBtn').addEventListener('click', () => $('importFileInput').click());
    $('importFileInput').addEventListener('change', function(e) {
      if (this.files && this.files[0]) {
        importData(this.files[0]);
      }
      this.value = '';
    });

    // 後端設定
    $('backendConfigBtn').addEventListener('click', () => {
      $('backendUrlInput').value = localStorage.getItem('multinote_api_url') || '';
      $('backendKeyInput').value = localStorage.getItem('multinote_supabase_key') || '';
      $('backendModal').classList.add('open');
    });
    $('backendCancelBtn').addEventListener('click', () => $('backendModal').classList.remove('open'));
    $('backendSaveBtn').addEventListener('click', () => {
      const url = $('backendUrlInput').value.trim();
      const key = $('backendKeyInput').value.trim();
      if (url) {
        localStorage.setItem('multinote_api_url', url);
        if (key) localStorage.setItem('multinote_supabase_key', key);
        showToast('✅ 後端設定已儲存，請重新整理頁面');
      } else {
        localStorage.removeItem('multinote_api_url');
        localStorage.removeItem('multinote_supabase_key');
        showToast('🔄 已切換為本機模式，請重新整理頁面');
      }
      $('backendModal').classList.remove('open');
    });
    // 點擊 backdrop 關閉
    $('backendModal').addEventListener('click', e => {
      if (e.target === $('backendModal')) $('backendModal').classList.remove('open');
    });

    // 類別面板開關
    $('manageCatBtn').addEventListener('click', toggleCatPanel);

    // 新增類別確認
    $('addCatConfirmBtn').addEventListener('click', () => {
      addCategory($('newCatInput').value);
    });
    $('newCatInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') addCategory(e.target.value);
    });

    // 搜尋
    searchInput.addEventListener('input', e => {
      searchQuery = e.target.value;
      renderNotes();
    });

    // Modal 取消 / 儲存
    $('modalCancelBtn').addEventListener('click', closeModal);
    $('modalSaveBtn').addEventListener('click', saveNote);

    // 按 Escape 關閉 Modal
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeModal();
    });

    // 點擊 Modal 外部關閉
    modalOverlay.addEventListener('click', e => {
      if (e.target === modalOverlay) closeModal();
    });

    // ===== 委派事件（動態元素） =====

    // 類別按鈕點擊
    catGroup.addEventListener('click', e => {
      const btn = e.target.closest('.cat-btn');
      if (!btn) return;
      currentFilter = btn.dataset.cat;
      renderCategories();
      renderNotes();
    });

    // 管理面板：刪除類別
    $('catList').addEventListener('click', e => {
      const remove = e.target.closest('.remove-cat');
      if (!remove) return;
      removeCategory(remove.dataset.cat);
    });

    // 筆記卡片：編輯 & 刪除
    grid.addEventListener('click', e => {
      const editBtn = e.target.closest('.edit-btn');
      const delBtn  = e.target.closest('.del-btn');

      if (editBtn) {
        openEditModal(editBtn.dataset.id);
        return;
      }
      if (delBtn) {
        deleteNote(delBtn.dataset.id);
        return;
      }
    });

    // ============================================================
    //  八、啟動
    // ============================================================

    // 非同步啟動：後端模式 → 從 API 載入；本機模式 → IndexedDB
    const startApp = () => {
      initTheme();
      renderCategories();
      renderNotes();
      updateDebugBar();
      debugData();
      console.log('🚀 多功能筆記本啟動完畢');
    };

    initSupabase();
    if (isBackendMode()) {
      backLoadAll().then(startApp).catch(startApp);
    } else {
      initData().then(startApp).catch(e => {
        console.error('啟動失敗:', e);
        startApp();
      });
    }

    // Ctrl+N 快速新增
    document.addEventListener('keydown', e => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'n') {
        e.preventDefault();
        openAddModal();
      }
    });

    console.log('📝 多功能筆記本已啟動 — 資料存於 LocalStorage');
  </script>
</body>
</html>
